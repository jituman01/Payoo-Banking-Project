<!DOCTYPE html>
<html lang="en">

<head data-theme="light">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payoo | Login</title>
  <link rel="shortcut icon" href=".//assets/logo.png" type="image/x-icon">

  <!-- Tailwind + Daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>

</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
  <div class="logo w-[260px] mx-auto pt-[180px]">
    <img src=".//assets/Logo-full.png" alt="">
  </div>

  <div class="form pt-8 ">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-medium text-[16px] text-[#080808] ">Mobile Number</label>
          <input id="input-number" maxlength="11" minlength="11" type="" class="input rounded-3xl bg-[#F4F5F7]"
            value="01234567890" placeholder="Enter Your Mobile Number" />
          <label class="label font-medium text-[16px] text-[#080808]">4 Digit Pin</label>
          <input id="input-pin" maxlength="4" minlength="4" type="password" class="input rounded-3xl bg-[#F4F5F7]"
            value="1234" placeholder="Enter 4 Digit Pin" />
          <button id="login-btn"
            class="btn btn-neutral mt-4 rounded-3xl bg-[#3B25C1] border-none shadow-none py-[14px]">Login</button>
        </fieldset>
      </div>
    </div>
  </div>

  <script src=".//script/login.js"></script>
</body>

</html>
