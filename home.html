<!DOCTYPE html>
<html lang="en">

<head data-theme="light">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payoo | Home</title>
  <link rel="shortcut icon" href=".//assets/logo.png" type="image/x-icon">

  <!-- Tailwind + Daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>

</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

  <header class="border-b-2 border-gray-400 sticky top-0 bg-base-200 z-10">
    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
      <div class="left flex gap-[8px]">
        <img class="w-[60px]" src=".//assets/logo.png" alt="">

        <div class="balance-info">
          <h2 class="text-2xl font-extrabold ">$ <span id="balance">45000</span></h2>
          <p class="text-neutral/50">Available Balance</p>
        </div>
      </div>


      <div class="right">
        <a href="/index.html" class="btn btn-soft"><span><i class="fa-solid fa-arrow-right-from-bracket"></i></span>Log
          Out</a>
      </div>
    </section>
  </header>

  <section class="w-11/12 mx-auto py-[32px] space-y-4 ">
    <h2 class="font-bold text-[24px]">Welcome to Pay<span class="text-[#7460FF]">oo</span></h2>
    <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>

    <div class="buttons grid grid-cols-3 gap-4 mt-[30px]">
      <button onclick="showOnly('add-money')" class="btn flex-col h-full py-[20px] btn-primary btn-soft rounded-2xl">
        <img src=".//assets/opt-1.png" alt="">
        <p>Add Money</p>
      </button>
      <button onclick="showOnly('cashout')" class="btn flex-col h-full py-[20px] btn-primary btn-soft rounded-2xl">
        <img src=".//assets/opt-2.png" alt="">
        <p>Cashout</p>
      </button>
      <button onclick="showOnly('transfer')" class="btn flex-col h-full py-[20px] btn-primary btn-soft rounded-2xl">
        <img src=".//assets/opt-3.png" alt="">
        <p>Transfer Money</p>
      </button>
      <button onclick="showOnly('bonus')" class="btn flex-col h-full py-[20px] btn-primary btn-soft rounded-2xl">
        <img src=".//assets/opt-4.png" alt="">
        <p>Get Bonus</p>
      </button>
      <button onclick="showOnly('bill')" class="btn flex-col h-full py-[20px] btn-primary btn-soft rounded-2xl">
        <img src=".//assets/opt-5.png" alt="">
        <p>Pay Bill</p>
      </button>
      <button onclick="showOnly('history')" class="btn flex-col h-full py-[20px] btn-primary btn-soft rounded-2xl">
        <img src=".//assets/opt-6.png" alt="">
        <p>Transactions</p>
      </button>
    </div>
  </section>

  <section id="add-money" class="w-11/12 mx-auto hidden">
    <h2 class="text-[18px] font-semibold mb-4">Add Money</h2>
    <div class="card bg-base-100 w-full shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset space-y-2">

          <label class="label font-medium text-[16px] text-[#080808] ">Bank Account Number</label>
        <select id="add-money-bank" class="select rounded-3xl bg-[#F4F5F7] w-full">
          <option disabled selected class="">Select Bank</option>
          <option value="DBBL">DBBL</option>
          <option value="IBBL">IBBL</option>
          <option value="City Bank">City Bank</option>
        </select>
        <!-- <br> -->

          <label class="label font-medium text-[16px] text-[#080808] ">Bank Account Number</label>
          <input id="add-money-number" maxlength="11" minlength="11" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter 11 digit account number" />
    
          <label class="label font-medium text-[16px] text-[#080808] ">Amount to Add</label>
          <input id="add-money-amount" maxlength="" minlength="" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
             placeholder="Add Amount to withdraw" />
    
          <label class="label font-medium text-[16px] text-[#080808]">Pin Number</label>
          <input id="add-money-pin" maxlength="4" minlength="4" type="password" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter 4 digit pin number" />
    
          <button id="add-money-btn"
            class="btn btn-neutral mt-4 rounded-3xl bg-[#3B25C1] border-none shadow-none py-[14px]">Add Money</button>
        </fieldset>
      </div>
    </div>
  </section>

  <section id="cashout" class="w-11/12 mx-auto hidden">
    <h2 class="text-[18px] font-semibold mb-4">Cash Out</h2>
    <div class="card bg-base-100 w-full shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset space-y-2">
          <label class="label font-medium text-[16px] text-[#080808] ">Agent Number</label>
          <input id="cashout-number" maxlength="11" minlength="11" type=""
            class="input rounded-3xl bg-[#F4F5F7] w-full" value="" placeholder="Enter 11 digit number" />

          <label class="label font-medium text-[16px] text-[#080808] ">Amount</label>
          <input id="cashout-amount" maxlength="" minlength="" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter amount to withdraw" />

          <label class="label font-medium text-[16px] text-[#080808]">Pin Number</label>
          <input id="cashout-pin" maxlength="4" minlength="4" type="password"
            class="input rounded-3xl bg-[#F4F5F7] w-full" value="" placeholder="Enter 4 digit pin number" />

          <button id="cashout-btn"
            class="btn btn-neutral mt-4 rounded-3xl bg-[#3B25C1] border-none shadow-none py-[14px]">Withdraw
            Money</button>
        </fieldset>
      </div>
    </div>
  </section>

  <section id="history" class="w-11/12 mx-auto py-5 hidden">
    <h2 class="text-[18px] font-semibold mb-4">Transaction History</h2>
    <div id="history-container" class="space-y-5">
      <!-- <div class="transaction-card p-5 bg-base-100">

      </div> -->
    </div>

  </section>
  
  <section id="transfer" class="w-11/12 mx-auto hidden">
    <h2 class="text-[18px] font-semibold mb-4">Transfer Money</h2>
    <div class="card bg-base-100 w-full shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset space-y-2">
          <label class="label font-medium text-[16px] text-[#080808] ">User Account Number</label>
          <input id="transfer-number" maxlength="11" minlength="11" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter 11 digit number" />
    
          <label class="label font-medium text-[16px] text-[#080808] ">Amount</label>
          <input id="transfer-amount" maxlength="" minlength="" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter amount to transfer" />
    
          <label class="label font-medium text-[16px] text-[#080808]">Pin Number</label>
          <input id="transfer-pin" maxlength="4" minlength="4" type="password" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter 4 digit pin number" />
    
          <button id="transfer-btn"
            class="btn btn-neutral mt-4 rounded-3xl bg-[#3B25C1] border-none shadow-none py-[14px]">Send Now</button>
        </fieldset>
      </div>
    </div>
  </section>

  <section id="bill" class="w-11/12 mx-auto hidden">
    <h2 class="text-[18px] font-semibold mb-4">Pay Bill</h2>
    <div class="card bg-base-100 w-full shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset space-y-2">
  
          <label class="label font-medium text-[16px] text-[#080808] ">Select To Pay</label>
          <select id="select-back" class="select rounded-3xl bg-[#F4F5F7] w-full">
            <option disabled selected class="">Select Back</option>
            <option value="Gas">Gas Bill</option>
            <option value="Electricity">Electricity</option>
            <option value="Wifi">Wifi</option>
          </select>
          <!-- <br> -->
  
          <label class="label font-medium text-[16px] text-[#080808] ">Biller Account Number</label>
          <input id="biller-number" maxlength="11" minlength="11" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter account number" />
  
          <label class="label font-medium text-[16px] text-[#080808] ">Amount to Pay</label>
          <input id="biller-amount" maxlength="" minlength="" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            placeholder="Add Amount to pay" />
  
          <label class="label font-medium text-[16px] text-[#080808]">Pin Number</label>
          <input id="biller-pin" maxlength="4" minlength="4" type="password"
            class="input rounded-3xl bg-[#F4F5F7] w-full" value="" placeholder="Enter 4 digit pin number" />
  
          <button id="biller-btn"
            class="btn btn-neutral mt-4 rounded-3xl bg-[#3B25C1] border-none shadow-none py-[14px]">Pay Now</button>
        </fieldset>
      </div>
    </div>
  </section>

  <section id="coupon" class="w-11/12 mx-auto hidden">
    <h2 class="text-[18px] font-semibold mb-4">Get Bonus</h2>
    <div class="card bg-base-100 w-full shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset space-y-2">
          <label class="label font-medium text-[16px] text-[#080808] ">Enter Bonus Coupon</label>
          <input id="coupon-number" maxlength="11" minlength="11" type="" class="input rounded-3xl bg-[#F4F5F7] w-full"
            value="" placeholder="Enter your coupon" />
    
          <button id="coupon-btn"
            class="btn btn-neutral mt-4 rounded-3xl bg-[#3B25C1] border-none shadow-none py-[14px]">Get Bonus</button>
        </fieldset>
      </div>
    </div>
  </section>

  <script src=".//script/machine.js"></script>
  <script src=".//script/bonus.js"></script>
  <script src=".//script/bill.js"></script>
  <script src=".//script/transfer.js"></script>
  <script src=".//script/add-money.js"></script>
  <script src=".//script/cashout.js"></script>
</body>

</html>
